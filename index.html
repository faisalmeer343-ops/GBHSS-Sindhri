<!DOCTYPE html>
<html lang="sd" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صديقي اٽو مل سسٽم</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #f0f8ff;
            color: #333;
        }
        .container {
            max-width: 100%;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1, h2 {
            color: #2c3e50;
            text-align: center;
            margin: 10px 0;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #34495e;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background: #219653;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #3498db;
            color: white;
        }
        .tabs {
            display: flex;
            overflow-x: auto;
            margin-bottom: 15px;
            background: #ecf0f1;
            border-radius: 5px;
        }
        .tab {
            padding: 10px 15px;
            cursor: pointer;
            white-space: nowrap;
        }
        .tab.active {
            background: #3498db;
            color: white;
            border-radius: 5px;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        @media (max-width: 600px) {
            th, td {
                padding: 6px 3px;
                font-size: 12px;
            }
            .tab {
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>صديقي اٽو مل سسٽم</h1>
        
        <div class="tabs">
            <div class="tab active" onclick="openTab('customer')">گيراھڪ</div>
            <div class="tab" onclick="openTab('expense')">خرچ</div>
            <div class="tab" onclick="openTab('report')">رپورٽ</div>
        </div>
        
        <!-- گيراھڪ جو ٽيب -->
        <div id="customer" class="tab-content active">
            <h2>نئون گيراھڪ</h2>
            <div class="form-group">
                <label for="name">نالو:</label>
                <input type="text" id="name" placeholder="گيراھڪ جو نالو">
            </div>
            <div class="form-group">
                <label for="contact">رابطو:</label>
                <input type="text" id="contact" placeholder="فون نمبر">
            </div>
            <div class="form-group">
                <label for="wheatDate">ڪڻڪ جمع ڪرڻ جي تاريخ:</label>
                <input type="date" id="wheatDate">
            </div>
            <div class="form-group">
                <label for="wheat">ڪڻڪ (ڪلو):</label>
                <input type="number" id="wheat" placeholder="ڪڻڪ جو مقدار">
            </div>
            <button onclick="addCustomer()">محفوظ ڪريو</button>
            
            <h2>اٽو واپس وٺڻ</h2>
            <div class="form-group">
                <label for="customerId">گيراھڪ ID:</label>
                <input type="number" id="customerId" placeholder="گيراھڪ جو نمبر">
            </div>
            <div class="form-group">
                <label for="aataDate">اٽو وٺڻ جي تاريخ:</label>
                <input type="date" id="aataDate">
            </div>
            <div class="form-group">
                <label for="aataTaken">اٽو (ڪلو):</label>
                <input type="number" id="aataTaken" placeholder="وٺيل اٽو">
            </div>
            <button onclick="takeAata()">اٽو رڪارڊ ڪريو</button>
            
            <h2>گيراھڪن جو ريڪارڊ</h2>
            <div style="overflow-x:auto;">
                <table id="customerTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <thنالو</th>
                            <th>رابطو</th>
                            <th>ڪڻڪ تاريخ</th>
                            <th>ڪڻڪ (ڪلو)</th>
                            <th>پسائي فِي</th>
                            <th>اٽو تاريخ</th>
                            <th>وٺيل اٽو</th>
                            <th>باقي اٽو</th>
                        </tr>
                    </thead>
                    <tbody id="customerList">
                        <!-- JavaScript سان ڀريو ويندو -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- خرچ جو ٽيب -->
        <div id="expense" class="tab-content">
            <h2>خرچ شامل ڪريو</h2>
            <div class="form-group">
                <label for="expenseType">خرچ جو قسم:</label>
                <select id="expenseType">
                    <option value="پسائي ڪٽوتي">پسائي ڪٽوتي (300 روپيا)</option>
                    <option value="بجلي">بجلي</option>
                    <option value="چانهه">چانهه</option>
                    <option value="ملازم">ملازم</option>
                    <option value="ٻيو">ٻيو</option>
                </select>
            </div>
            <div class="form-group">
                <label for="amount">رقم (روپيا):</label>
                <input type="number" id="amount" placeholder="خرچ جي رقم">
            </div>
            <div class="form-group">
                <label for="details">تفصيل:</label>
                <input type="text" id="details" placeholder="وڌيڪ تفصيل">
            </div>
            <button onclick="addExpense()">خرچ محفوظ ڪريو</button>
            
            <h2>خرچ جو ريڪارڊ</h2>
            <div style="overflow-x:auto;">
                <table id="expenseTable">
                    <thead>
                        <tr>
                            <th>تاريخ</th>
                            <th>قس</th>
                            <th>رقم</th>
                            <th>تفصيل</th>
                        </tr>
                    </thead>
                    <tbody id="expenseList">
                        <!-- JavaScript سان ڀريو ويندو -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- ريپورٽ جو ٽيب -->
        <div id="report" class="tab-content">
            <h2>فائدو/نقصان جو ريپورٽ</h2>
            <div class="form-group">
                <label for="fromDate">کان تاريخ:</label>
                <input type="date" id="fromDate">
            </div>
            <div class="form-group">
                <label for="toDate">تائين تاريخ:</label>
                <input type="date" id="toDate">
            </div>
            <button onclick="generateReport()">ريپورٽ ڏيکاريو</button>
            
            <div id="reportResult" style="margin-top:20px;">
                <!-- ريپورٽ هتي ڏيکاري ويندي -->
            </div>
        </div>
    </div>

    <script>
        // ڊيٽا اسٽوريج
        let customers = JSON.parse(localStorage.getItem('customers')) || [];
        let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
        let profits = JSON.parse(localStorage.getItem('profits')) || [];

        // ٽيب تبديل ڪرڻ لاءِ فنڪشن
        function openTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            document.getElementById(tabName).classList.add('active');
            document.querySelector(`.tab[onclick="openTab('${tabName}')"]`).classList.add('active');
        }

        // گيراھڪ شامل ڪرڻ
        function addCustomer() {
            const name = document.getElementById('name').value;
            const contact = document.getElementById('contact').value;
            const wheatDate = document.getElementById('wheatDate').value;
            const wheat = parseFloat(document.getElementById('wheat').value);
            
            if (!name || !contact || !wheatDate || !wheat) {
                alert('مهرباني ڪري سڀ ڪٽنب ڀريو!');
                return;
            }
            
            const newCustomer = {
                id: customers.length + 1,
                name,
                contact,
                wheatDate,
                wheat,
                grindingFee: 300, // پسائي فِي
                aataDate: '',
                aataTaken: 0,
                balance: wheat,
                date: new Date().toLocaleDateString('en-GB')
            };
            
            customers.push(newCustomer);
            localStorage.setItem('customers', JSON.stringify(customers));
            updateCustomerList();
            
            // پسائي فِي کي خرچ ۾ شامل ڪريو
            const newExpense = {
                date: new Date().toLocaleDateString('en-GB'),
                type: "پسائي ڪٽوتي",
                amount: 300,
                details: `${name} جي ڪڻڪ جي پسائي`
            };
            expenses.push(newExpense);
            localStorage.setItem('expenses', JSON.stringify(expenses));
            updateExpenseList();
            
            // آمدني رڪارڊ ڪريو (300 روپيا في گيراھڪ)
            const newProfit = {
                date: new Date().toLocaleDateString('en-GB'),
                income: 300,
                expense: 0,
                profit: 300
            };
            profits.push(newProfit);
            localStorage.setItem('profits', JSON.stringify(profits));
            
            alert('گيراھڪ ڪاميابي سان شامل ٿيو!');
            document.getElementById('name').value = '';
            document.getElementById('contact').value = '';
            document.getElementById('wheat').value = '';
        }

        // اٽو واپس وٺڻ
        function takeAata() {
            const customerId = parseInt(document.getElementById('customerId').value) - 1;
            const aataDate = document.getElementById('aataDate').value;
            const aataTaken = parseFloat(document.getElementById('aataTaken').value);
            
            if (customerId < 0 || customerId >= customers.length || !aataDate || !aataTaken) {
                alert('غلط گيراھڪ ID يا ڪٽنب!');
                return;
            }
            
            if (aataTaken > customers[customerId].balance) {
                alert('گيراھڪ وٽ ايتري مقدار ۾ اٽو موجود ناهي!');
                return;
            }
            
            customers[customerId].aataDate = aataDate;
            customers[customerId].aataTaken += aataTaken;
            customers[customerId].balance -= aataTaken;
            localStorage.setItem('customers', JSON.stringify(customers));
            updateCustomerList();
            
            alert(`${aataTaken}ڪلو اٽو رڪارڊ ٿيل! باقي: ${customers[customerId].balance}ڪلو`);
            document.getElementById('customerId').value = '';
            document.getElementById('aataTaken').value = '';
        }

        // خرچ شامل ڪرڻ
        function addExpense() {
            const type = document.getElementById('expenseType').value;
            let amount = parseFloat(document.getElementById('amount').value);
            const details = document.getElementById('details').value;
            
            if (type === "پسائي ڪٽوتي") {
                amount = 300; // خود بخود 300 روپيا ڀريو
                document.getElementById('amount').value = 300;
            }
            
            if (!amount) {
                alert('مهرباني ڪري رقم داخل ڪريو!');
                return;
            }
            
            const newExpense = {
                date: new Date().toLocaleDateString('en-GB'),
                type,
                amount,
                details
            };
            
            expenses.push(newExpense);
            localStorage.setItem('expenses', JSON.stringify(expenses));
            updateExpenseList();
            
            // خرچ رڪارڊ ڪريو
            const newProfit = {
                date: new Date().toLocaleDateString('en-GB'),
                income: 0,
                expense: amount,
                profit: -amount
            };
            profits.push(newProfit);
            localStorage.setItem('profits', JSON.stringify(profits));
            
            alert('خرچ ڪاميابي سان محفوظ ٿيل!');
            document.getElementById('amount').value = '';
            document.getElementById('details').value = '';
        }

        // گيراھڪن جي فھرست کي اپڊيٽ ڪرڻ
        function updateCustomerList() {
            const table = document.getElementById('customerList');
            table.innerHTML = '';
            
            customers.forEach(customer => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${customer.id}</td>
                    <td>${customer.name}</td>
                    <td>${customer.contact}</td>
                    <td>${customer.wheatDate}</td>
                    <td>${customer.wheat}</td>
                    <td>${customer.grindingFee}</td>
                    <td>${customer.aataDate || '-'}</td>
                    <td>${customer.aataTaken}</td>
                    <td>${customer.balance}</td>
                `;
                table.appendChild(row);
            });
        }

        // خرچ جي فھرست کي اپڊيٽ ڪرڻ
        function updateExpenseList() {
            const table = document.getElementById('expenseList');
            table.innerHTML = '';
            
            expenses.forEach(expense => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${expense.date}</td>
                    <td>${expense.type}</td>
                    <td>${expense.amount}</td>
                    <td>${expense.details}</td>
                `;
                table.appendChild(row);
            });
        }

        // ريپورٽ ٺاهڻ
        function generateReport() {
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;
            
            let filteredProfits = profits;
            
            if (fromDate && toDate) {
                const startDate = new Date(fromDate);
                const endDate = new Date(toDate);
                
                filteredProfits = profits.filter(p => {
                    const pDate = new Date(p.date.split('/').reverse().join('-'));
                    return pDate >= startDate && pDate <= endDate;
                });
            }
            
            let totalIncome = 0;
            let totalExpense = 0;
            let totalProfit = 0;
            
            filteredProfits.forEach(p => {
                totalIncome += p.income;
                totalExpense += p.expense;
                totalProfit += p.profit;
            });
            
            const reportDiv = document.getElementById('reportResult');
            reportDiv.innerHTML = `
                <h3>ريپورٽ:</h3>
                <p><strong>مدت:</strong> ${fromDate || 'شروع'} کان ${toDate || 'هاڻي'}</p>
                <p><strong>ڪل آمدني:</strong> ${totalIncome} روپيا</p>
                <p><strong>ڪل خرچ:</strong> ${totalExpense} روپيا</p>
                <p><strong>ڪل فائدو:</strong> <span style="color:${totalProfit >= 0 ? 'green' : 'red'}">${totalProfit} روپيا</span></p>
                
                <h4>گيراھڪن جو مجموعو:</h4>
                <p>ڪل گيراھڪ: ${customers.length}</p>
                <p>ڪل ڪڻڪ: ${customers.reduce((sum, c) => sum + c.wheat, 0)} ڪلو</p>
                <p>ڪل اٽو وٺيل: ${customers.reduce((sum, c) => sum + c.aataTaken, 0)} ڪلو</p>
            `;
        }

        // پهريان کان موجود ڊيٽا ڏيکاريو
        updateCustomerList();
        updateExpenseList();
        
        // اڄ جي تاريخ ڀريو
        document.getElementById('wheatDate').valueAsDate = new Date();
        document.getElementById('aataDate').valueAsDate = new Date();
        document.getElementById('fromDate').valueAsDate = new Date();
        document.getElementById('toDate').valueAsDate = new Date();
    </script>
</body>
</html>
